<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kingshot Hero Capture</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f7;
      padding: 12px;
      margin: 0;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      font-family: monospace;
      box-sizing: border-box;
    }

    button, input[type="file"] {
      margin-top: 8px;
      margin-right: 8px;
    }

    .status {
      margin-top: 8px;
      min-height: 1.2rem;
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Hero Capture</h1>

  <div style="margin-bottom:10px;">
    <button onclick="location.href='index.html'">Back to Main</button>
  </div>

  <div class="card">
    <b>Upload Hero Screenshot</b><br><br>

    <input type="file" id="heroFile" accept="image/*"><br><br>
    <button onclick="readHero()">Read Hero</button>
    <div id="heroStatus" class="status"></div>

    <h3>OCR Output</h3>
    <textarea id="heroOCR"></textarea>

    <h3>Parsed Output</h3>
    <textarea id="heroParsed"></textarea>

    <button onclick="saveHero()">Save to Player</button>
  </div>
</div>

<script>
const DB_KEY = "kingshot_player_troops_capture_v1_db";
let currentHero = null;

const HERO_LIBRARY = {
  jabel: { canonical_name: "Jabel", troop_type: "cavalry", rarity: "SSR" },
  saul: { canonical_name: "Saul", troop_type: "archers", rarity: "SSR" },
  zoe: { canonical_name: "Zoe", troop_type: "infantry", rarity: "SSR" }
};

function setStatus(msg = "") {
  document.getElementById("heroStatus").textContent = msg;
}

function getDb() {
  const raw = localStorage.getItem(DB_KEY);
  return raw ? JSON.parse(raw) : { version: "v1", players: {} };
}

function setDb(db) {
  localStorage.setItem(DB_KEY, JSON.stringify(db));
}

function nowIso() {
  return new Date().toISOString();
}

function cleanInt(s) {
  return parseInt(String(s || "").replace(/,/g, "").replace(/[^\d]/g, ""), 10) || 0;
}

function normalizeHeroText(text) {
  return String(text || "")
    .replace(/[’']/g, "'")
    .replace(/\s+/g, " ")
    .trim();
}

function normalizeHeroName(name) {
  return String(name || "")
    .toLowerCase()
    .replace(/[^a-z0-9]/g, "");
}

async function readHero() {
  const file = document.getElementById("heroFile").files[0];
  if (!file) {
    alert("Upload image first");
    return;
  }

  setStatus("Reading hero screenshot...");

  const result = await Tesseract.recognize(file, "eng");
  const text = result.data.text || "";

  document.getElementById("heroOCR").value = text;

  currentHero = parseHeroOverviewText(text);

  document.getElementById("heroParsed").value =
    JSON.stringify(currentHero, null, 2);

  setStatus("Hero parsed.");
}

function parseHeroOverviewText(text) {
  const raw = String(text || "");
  const lines = raw
    .split(/\n+/)
    .map(l => normalizeHeroText(l))
    .filter(Boolean);

  const rec = {
    screen_type: "hero_overview",
    hero_name: null,
    troop_type: null,
    rarity: null,
    level: null,
    hero_power: null,
    escort_count: null,
    troop_capacity: null,
    star_full: null,
    star_segments: null,
    captured_at: nowIso(),
    review_flags: []
  };

  for (const line of lines) {
    if (/escorts|level|troops capacity|stats|skills|gear|upgrade/i.test(line)) continue;
    if (/^[A-Za-z][A-Za-z0-9' -]{2,}$/.test(line)) {
      rec.hero_name = line.trim();
      break;
    }
  }

  if (/SSR/i.test(raw)) rec.rarity = "SSR";
  else if (/SR/i.test(raw)) rec.rarity = "SR";
  else if (/\bR\b/i.test(raw)) rec.rarity = "R";

  const powerMatch = raw.match(/\b\d{1,3}(?:,\d{3})+\b/);
  if (powerMatch) {
    rec.hero_power = cleanInt(powerMatch[0]);
  }

  const escortMatch = raw.match(/Escorts\s*(\d+)/i);
  if (escortMatch) rec.escort_count = cleanInt(escortMatch[1]);

  const levelMatch = raw.match(/Level\s*(\d+)/i);
  if (levelMatch) rec.level = cleanInt(levelMatch[1]);

  const capMatch = raw.match(/Troops?\s*Capacity\s*(\d[\d,]*)/i);
  if (capMatch) rec.troop_capacity = cleanInt(capMatch[1]);

  const heroKey = normalizeHeroName(rec.hero_name);
  const heroMeta = HERO_LIBRARY[heroKey];

  if (heroMeta) {
    rec.hero_name = heroMeta.canonical_name;
    if (!rec.troop_type) rec.troop_type = heroMeta.troop_type;
    if (!rec.rarity) rec.rarity = heroMeta.rarity;
  }

  if (!rec.hero_name) rec.review_flags.push("Missing hero_name");
  if (!rec.level) rec.review_flags.push("Missing level");
  if (!rec.hero_power) rec.review_flags.push("Missing hero_power");
  if (!rec.escort_count) rec.review_flags.push("Missing escort_count");
  if (!rec.troop_capacity) rec.review_flags.push("Missing troop_capacity");
  if (!rec.troop_type) rec.review_flags.push("Missing troop_type");
  if (!rec.rarity) rec.review_flags.push("Missing rarity");

  return rec;
}

function saveHero() {
  if (!currentHero) {
    alert("No hero parsed yet");
    return;
  }

  const db = getDb();
  const playerId = prompt("Enter player ID to attach hero:");

  if (!playerId) return;

  if (!db.players[playerId]) {
    alert("Player not found in DB");
    return;
  }

  db.players[playerId].hero = currentHero;
  db.players[playerId].updated_at = nowIso();

  setDb(db);

  alert("Hero saved to player " + playerId);
  setStatus("Hero saved.");
}
</script>
</body>
</html>
