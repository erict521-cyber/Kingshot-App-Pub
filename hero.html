<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kingshot Hero Capture</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f7;
      padding: 12px;
      margin: 0;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      font-family: monospace;
      box-sizing: border-box;
    }

    button, input[type="file"] {
      margin-top: 8px;
      margin-right: 8px;
    }

    .status {
      margin-top: 8px;
      min-height: 1.2rem;
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Hero Capture</h1>

  <div style="margin-bottom:10px;">
    <button onclick="location.href='index.html'">Back to Main</button>
  </div>

  <div class="card">
    <b>Upload Hero Screenshot</b><br><br>

    <input type="file" id="heroFile" accept="image/*"><br><br>
    <button onclick="readHero()">Read Hero</button>
    <div id="heroStatus" class="status"></div>

    <h3>OCR Output</h3>
    <textarea id="heroOCR"></textarea>

    <h3>Parsed Output</h3>
    <textarea id="heroParsed"></textarea>

    <button onclick="saveHero()">Save to Player</button>
  </div>
</div>

<div class="card">
  <b>Upload Hero Stats Screenshot</b><br><br>

  <input type="file" id="heroStatsFile" accept="image/*"><br><br>
  <button onclick="readHeroStats()">Read Hero Stats</button>
  <div id="heroStatsStatus" class="status"></div>

  <h3>Hero Stats OCR Output</h3>
  <textarea id="heroStatsOCR"></textarea>

  <h3>Hero Stats Parsed Output</h3>
  <textarea id="heroStatsParsed"></textarea>

  <button onclick="saveHeroStats()">Save Hero Stats to Player</button>
</div>
<div class="card">
  <b>Upload Hero Skills Screenshot</b><br><br>

  <input type="file" id="heroSkillsFile" accept="image/*"><br><br>
  <button onclick="readHeroSkills()">Read Hero Skills</button>
  <div id="heroSkillsStatus" class="status"></div>

  <h3>Hero Skills OCR Output</h3>
  <textarea id="heroSkillsOCR"></textarea>

  <h3>Hero Skills Parsed Output</h3>
  <textarea id="heroSkillsParsed"></textarea>

<h3>Hero Skills Crop Debug</h3>
<div id="heroSkillsDebug" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>

  <button onclick="saveHeroSkills()">Save Hero Skills</button>
</div>

<script>
const DB_KEY = "kingshot_player_troops_capture_v1_db";
let currentHero = null;
let currentHeroOverview = null;
let currentHeroStats = null;

const HERO_LIBRARY = {
  jabel: { canonical_name: "Jabel", troop_type: "cavalry", rarity: "SSR" },
  saul: { canonical_name: "Saul", troop_type: "archers", rarity: "SSR" },
  zoe: { canonical_name: "Zoe", troop_type: "infantry", rarity: "SSR" }
};

function setStatus(msg = "") {
  document.getElementById("heroStatus").textContent = msg;
}

function getDb() {
  const raw = localStorage.getItem(DB_KEY);
  return raw ? JSON.parse(raw) : { version: "v1", players: {} };
}

function setDb(db) {
  localStorage.setItem(DB_KEY, JSON.stringify(db));
}

function nowIso() {
  return new Date().toISOString();
}

function cleanInt(s) {
  return parseInt(String(s || "").replace(/,/g, "").replace(/[^\d]/g, ""), 10) || 0;
}

function normalizeHeroText(text) {
  return String(text || "")
    .replace(/[’']/g, "'")
    .replace(/\s+/g, " ")
    .trim();
}

function normalizeHeroName(name) {
  return String(name || "")
    .toLowerCase()
    .replace(/[^a-z0-9]/g, "");
}

function getSkillSlotRegions() {
  return {
    slot_1: [0.12, 0.26, 0.23, 0.323],
    slot_2: [0.07, 0.4, 0.18, 0.413],
    slot_3: [0.10, 0.58, 0.22, 0.70],

    slot_4: [0.78, 0.26, 0.90, 0.38],
    slot_5: [0.80, 0.42, 0.92, 0.54],
    slot_6: [0.78, 0.58, 0.90, 0.70]
  };
}

function cropCanvasRect(source, x1, y1, x2, y2) {
  return cropCanvas(source, x1, y1, x2 - x1, y2 - y1);
}

function upscaleCanvas(sourceCanvas, scale = 4) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = sourceCanvas.width * scale;
  canvas.height = sourceCanvas.height * scale;

  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(
    sourceCanvas,
    0, 0, sourceCanvas.width, sourceCanvas.height,
    0, 0, canvas.width, canvas.height
  );

  return canvas;
}

function canvasToDataUrl(canvas) {
  return canvas.toDataURL("image/png");
}

function renderSkillDebug(debugItems) {
  const container = document.getElementById("heroSkillsDebug");
  container.innerHTML = "";

  debugItems.forEach(item => {
    const wrap = document.createElement("div");
    wrap.style.border = "1px solid #ccc";
    wrap.style.padding = "8px";
    wrap.style.background = "#fff";

    const title = document.createElement("div");
    title.textContent = item.label;
    title.style.fontWeight = "bold";
    title.style.marginBottom = "6px";

    const img = document.createElement("img");
    img.src = canvasToDataUrl(item.canvas);
    img.style.width = "100%";
    img.style.display = "block";
    img.style.border = "1px solid #ddd";
    img.style.background = "#f7f7f7";

    wrap.appendChild(title);
    wrap.appendChild(img);
    container.appendChild(wrap);
  });
}

function thresholdCanvas(sourceCanvas, threshold = 165) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = sourceCanvas.width;
  canvas.height = sourceCanvas.height;
  ctx.drawImage(sourceCanvas, 0, 0);

  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = img.data;

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];
    const avg = (r + g + b) / 3;
    const v = avg > threshold ? 255 : 0;
    data[i] = v;
    data[i + 1] = v;
    data[i + 2] = v;
  }

  ctx.putImageData(img, 0, 0);
  return canvas;
}

async function readHero() {
  const file = document.getElementById("heroFile").files[0];
  if (!file) {
    alert("Upload image first");
    return;
  }

  setStatus("Reading hero screenshot...");

  try {
    const img = await loadImageFromFile(file);

    const nameCanvas = cropCanvas(img, 0.28, 0.00, 0.42, 0.12);
    const powerCanvas = cropCanvas(img, 0.18, 0.46, 0.52, 0.14);
    const summaryRowCanvas = cropCanvas(img, 0.08, 0.60, 0.78, 0.18);
    const levelCanvas = cropCanvas(img, 0.34, 0.62, 0.22, 0.16);
    const rarityCanvas = cropCanvas(img, 0.00, 0.08, 0.20, 0.12);

    const fullResult = await Tesseract.recognize(file, "eng");
    const fullText = fullResult.data.text || "";

    const nameText = await ocrCanvas(
      nameCanvas,
      "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz "
    );

    const powerText = await ocrCanvas(
      powerCanvas,
      "0123456789, "
    );

    const summaryRowText = await ocrCanvas(
      summaryRowCanvas,
      "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789, "
    );

    const levelText = await ocrCanvas(
      levelCanvas,
      "0123456789 "
    );

    const rarityText = await ocrCanvas(
      rarityCanvas,
      "ABCDEFGHIJKLMNOPQRSTUVWXYZ"
    );

    const debugText = [
      "--- NAME OCR ---",
      nameText,
      "",
      "--- POWER OCR ---",
      powerText,
      "",
      "--- SUMMARY ROW OCR ---",
      summaryRowText,
      "",
      "--- LEVEL OCR ---",
      levelText,
      "",
      "--- RARITY OCR ---",
      rarityText,
      "",
      "--- FULL OCR ---",
      fullText
    ].join("\n");

    document.getElementById("heroOCR").value = debugText;

    currentHeroOverview = parseHeroOverviewParts({
      nameText,
      powerText,
      summaryRowText,
      levelText,
      rarityText,
      fullText
    });

    currentHero = currentHeroOverview;

document.getElementById("heroParsed").value =
  JSON.stringify(currentHeroOverview, null, 2);

    setStatus("Hero parsed.");
  } catch (err) {
    console.error(err);
    setStatus("Hero OCR failed: " + err.message);
  }
}

async function readHeroStats() {
  const file = document.getElementById("heroStatsFile").files[0];
  if (!file) {
    alert("Upload hero stats image first");
    return;
  }

  document.getElementById("heroStatsStatus").textContent = "Reading hero stats screenshot...";

  try {
    const img = await loadImageFromFile(file);

    // Crop top identity area: hero name + rarity
    const heroTopCanvas = cropCanvas(img, 0.22, 0.00, 0.56, 0.12);

    // Crop popup stats box
    const statsPanelCanvas = cropCanvas(img, 0.28, 0.40, 0.62, 0.47);

    const heroTopText = await ocrCanvas(
  heroTopCanvas,
  "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
);

    const statsPanelText = await ocrCanvas(
      statsPanelCanvas,
      "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789,+.% "
    );

    const fullResult = await Tesseract.recognize(file, "eng");
    const fullText = fullResult.data.text || "";

    const debugText = [
      "--- HERO TOP OCR ---",
      heroTopText,
      "",
      "--- STATS PANEL OCR ---",
      statsPanelText,
      "",
      "--- FULL OCR ---",
      fullText
    ].join("\n");

    document.getElementById("heroStatsOCR").value = debugText;

    currentHeroStats = parseHeroStatsParts({
      heroTopText,
      statsPanelText,
      fullText
    });

    document.getElementById("heroStatsParsed").value =
      JSON.stringify(currentHeroStats, null, 2);

    document.getElementById("heroStatsStatus").textContent = "Hero stats parsed.";
  } catch (err) {
    console.error(err);
    document.getElementById("heroStatsStatus").textContent =
      "Hero stats OCR failed: " + err.message;
  }
}

async function readHeroSkills() {
  const file = document.getElementById("heroSkillsFile").files[0];
  if (!file) {
    document.getElementById("heroSkillsStatus").textContent = "Choose a hero skills screenshot first.";
    return;
  }

  document.getElementById("heroSkillsStatus").textContent = "Reading hero skills screenshot...";

  try {
    const img = await loadImageFromFile(file);

    const heroTopCanvas = cropCanvasRect(img, 0.22, 0.00, 0.78, 0.12);
    const heroTopZoom = upscaleCanvas(heroTopCanvas, 3);

    const heroTopText = await ocrCanvas(
      heroTopZoom,
      "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
    );

    const regions = getSkillSlotRegions();
    const results = {};
    const debugItems = [];
    let ocrDump = `--- HERO TOP OCR ---\n${heroTopText}\n`;

    for (const [slot, coords] of Object.entries(regions)) {
      const iconCrop = cropCanvasRect(img, ...coords);

      // Badge area inside the icon crop
      const badgeCrop = cropCanvas(iconCrop, 0.18, 0.68, 0.64, 0.24);
      const badgeZoom = upscaleCanvas(badgeCrop, 5);

      debugItems.push({ label: `${slot} icon`, canvas: iconCrop });
      debugItems.push({ label: `${slot} badge`, canvas: badgeZoom });

      const text = await ocrCanvas(
  badgeZoom,
  "Lv.0123456789"
      );

      const cleaned = text.replace(/\s+/g, " ").trim();

const levelMatch = cleaned.match(/Lv\.?\s*(\d)/i);

results[slot] = {
  level: levelMatch ? parseInt(levelMatch[1], 10) : null,
  locked: null
};

      ocrDump += `\n--- ${slot} ---\n${cleaned}\n`;
    }

    const parsed = {
      hero_name: null,
      troop_type: null,
      rarity: null,
      slots: results
    };

    const topNorm = normalizeHeroName(heroTopText);
    for (const [key, meta] of Object.entries(HERO_LIBRARY)) {
      if (topNorm.includes(key)) {
        parsed.hero_name = meta.canonical_name;
        parsed.troop_type = meta.troop_type;
        parsed.rarity = meta.rarity;
        break;
      }
    }

    document.getElementById("heroSkillsOCR").value = ocrDump;
    document.getElementById("heroSkillsParsed").value =
      JSON.stringify(parsed, null, 2);

    renderSkillDebug(debugItems);

    document.getElementById("heroSkillsStatus").textContent = "Hero skills parsed.";
  } catch (err) {
    console.error(err);
    document.getElementById("heroSkillsStatus").textContent =
      "Hero skills OCR failed: " + err.message;
  }
}

function parseHeroOverviewParts(parts) {
  const {
    nameText = "",
    powerText = "",
    summaryRowText = "",
    levelText = "",
    rarityText = "",
    fullText = ""
  } = parts || {};

  const rec = {
    screen_type: "hero_overview",
    hero_name: null,
    troop_type: null,
    rarity: null,
    level: null,
    hero_power: null,
    escort_count: null,
    troop_capacity: null,
    star_full: null,
    star_segments: null,
    captured_at: nowIso(),
    review_flags: []
  };

  let rawName = String(nameText || "")
    .replace(/[^A-Za-z ]/g, " ")
    .replace(/\s+/g, " ")
    .trim();

  let heroMeta = null;

  if (rawName) {
    const heroKey = normalizeHeroName(rawName);
    heroMeta = HERO_LIBRARY[heroKey] || null;
  }

  if (!heroMeta) {
    const fullNorm = normalizeHeroName(fullText);
    for (const [key, meta] of Object.entries(HERO_LIBRARY)) {
      if (fullNorm.includes(key)) {
        heroMeta = meta;
        break;
      }
    }
  }

  if (heroMeta) {
    rec.hero_name = heroMeta.canonical_name;
    rec.troop_type = heroMeta.troop_type;
    rec.rarity = heroMeta.rarity;
  } else if (rawName.length >= 3) {
    rec.hero_name = rawName;
  }

  if (!rec.rarity) {
    const rarityRaw = `${rarityText} ${fullText}`;
    if (/SSR/i.test(rarityRaw)) rec.rarity = "SSR";
    else if (/SR/i.test(rarityRaw)) rec.rarity = "SR";
    else if (/\bR\b/i.test(rarityRaw)) rec.rarity = "R";
  }

  // hero power: first big comma number in full OCR
  const powerMatch =
    String(fullText || "").match(/\b\d{1,3}(?:,\d{3})+\b/) ||
    String(powerText || "").match(/\b\d{1,3}(?:,\d{3})+\b/);

  if (powerMatch) {
    rec.hero_power = cleanInt(powerMatch[0]);
  }

  // escorts + troop capacity:
  // parse from the full OCR block after "Escorts Level Troops Capacity"
  const fullLines = String(fullText || "")
    .split(/\n+/)
    .map(s => s.trim())
    .filter(Boolean);

  const summaryIdx = fullLines.findIndex(line =>
    /Escorts/i.test(line) && /Level/i.test(line) && /Troops?\s*Capacity/i.test(line)
  );

  if (summaryIdx >= 0 && summaryIdx + 1 < fullLines.length) {
    const nextLine = fullLines[summaryIdx + 1];
    const nums = (nextLine.match(/\d[\d,]*/g) || [])
      .map(cleanInt)
      .filter(n => n > 0);

    // likely row = [10, 13,190] with level OCR failing in the middle
    const smallNums = nums.filter(n => n < 1000);
    const capNums = nums.filter(n => n >= 1000 && n < 100000);

    if (smallNums.length) rec.escort_count = smallNums[0];
    if (capNums.length) rec.troop_capacity = capNums[capNums.length - 1];
  }

  // fallback from summary crop only if still missing
  if (!rec.escort_count || !rec.troop_capacity) {
    const summaryNums = (String(summaryRowText || "").match(/\d[\d,]*/g) || [])
      .map(cleanInt)
      .filter(n => n > 0 && n < 100000); // ignore huge hero power junk

    const smallNums = summaryNums.filter(n => n < 1000);
    const capNums = summaryNums.filter(n => n >= 1000);

    if (!rec.escort_count && smallNums.length) rec.escort_count = smallNums[0];
    if (!rec.troop_capacity && capNums.length) rec.troop_capacity = capNums[capNums.length - 1];
  }

  // level: only trust if it looks realistic and not equal to escort count
  const levelNums = (String(levelText || "").match(/\d+/g) || [])
  .map(v => parseInt(v, 10))
  .filter(v => !isNaN(v) && v >= 1 && v <= 100);

// For now, reject suspicious low levels from this screen.
// Your tested heroes are not level 1, and this crop is still noisy.
if (levelNums.length) {
  const candidate = levelNums[0];
  if (candidate >= 10 && candidate !== rec.escort_count) {
    rec.level = candidate;
  }
}


  // if level crop fails, leave null for now rather than poisoning data
  if (!rec.hero_name) rec.review_flags.push("Missing hero_name");
  if (!rec.level) rec.review_flags.push("Missing level");
  if (!rec.hero_power) rec.review_flags.push("Missing hero_power");
  if (!rec.escort_count) rec.review_flags.push("Missing escort_count");
  if (!rec.troop_capacity) rec.review_flags.push("Missing troop_capacity");
  if (!rec.troop_type) rec.review_flags.push("Missing troop_type");
  if (!rec.rarity) rec.review_flags.push("Missing rarity");

  return rec;
}

function parseHeroStatsParts(parts) {
  const {
    heroTopText = "",
    statsPanelText = "",
    fullText = ""
  } = parts || {};

  const topRaw = String(heroTopText || "");
const topLines = topRaw
  .split(/\n+/)
  .map(s => s.trim())
  .filter(Boolean)
  .map(s => s.replace(/[^A-Za-z]/g, "").trim())
  .filter(Boolean);
  const statsRaw = String(statsPanelText || "");
  const fullRaw = String(fullText || "");

  // Use FULL OCR for real parsing because it preserves the digits better
  const parseLines = fullRaw
    .split(/\n+/)
    .map(s => s.trim())
    .filter(Boolean)
    .map(s => s.replace(/[|©®¥\/]/g, " ").replace(/\s+/g, " ").trim());

  const rec = {
    screen_type: "hero_stats",
    hero_name: null,
    troop_type: null,
    rarity: null,

    conquest: {
      hero_attack: null,
      hero_defense: null,
      hero_health: null,
      escort_attack: null,
      escort_defense: null,
      escort_health: null
    },

    expedition: {
      attack: null,
      defense: null,
      lethality: null,
      health: null
    },

    captured_at: nowIso(),
    confidence: { overall: 0.95 },
    review_flags: []
  };

  function extractLastNumber(line) {
    const matches = line.match(/[\d,]+(?:\.\d+)?/g) || [];
    if (!matches.length) return null;
    return parseFloat(matches[matches.length - 1].replace(/,/g, ""));
  }

  function extractLastPercent(line) {
    // allow OCR to use ¢ instead of %
    const cleaned = line.replace(/¢/g, "%");
    const matches = cleaned.match(/[+\-]?[\d.]+(?=\s*[%])/g) || [];
    if (!matches.length) return null;
    return parseFloat(matches[matches.length - 1].replace("+", ""));
  }

  function findLine(keyword) {
    for (const line of parseLines) {
      if (new RegExp(keyword, "i").test(line)) return line;
    }
    return null;
  }

  // -------- hero identity from FULL OCR first --------
  const fullLines = fullRaw
  .split(/\n+/)
  .map(s => s.trim())
  .filter(Boolean);

let matchedMeta = null;

// First try top crop lines
for (const line of topLines) {
  const normLine = normalizeHeroName(line);
  for (const [key, meta] of Object.entries(HERO_LIBRARY)) {
    if (normLine === key || normLine.includes(key)) {
      matchedMeta = meta;
      break;
    }
  }
  if (matchedMeta) break;
}

// Fallback to full OCR if needed
if (!matchedMeta) {
  const fullNorm = normalizeHeroName(fullRaw);
  for (const [key, meta] of Object.entries(HERO_LIBRARY)) {
    if (fullNorm.includes(key)) {
      matchedMeta = meta;
      break;
    }
  }
}

if (matchedMeta) {
  rec.hero_name = matchedMeta.canonical_name;
  rec.troop_type = matchedMeta.troop_type;
  rec.rarity = matchedMeta.rarity;
}


  // rarity fallback from top crop or full OCR
  if (!rec.rarity) {
    const rarityRaw = `${topRaw} ${fullRaw}`;
    if (/SSR/i.test(rarityRaw)) rec.rarity = "SSR";
    else if (/SR/i.test(rarityRaw)) rec.rarity = "SR";
    else if (/\bR\b/i.test(rarityRaw)) rec.rarity = "R";
  }

  // -------- conquest --------
  const conquestMap = [
    ["Hero Attack", "hero_attack"],
    ["Hero Defense", "hero_defense"],
    ["Hero Health", "hero_health"],
    ["Escort Attack", "escort_attack"],
    ["Escort Defense", "escort_defense"],
    ["Escort Health", "escort_health"]
  ];

  for (const [label, key] of conquestMap) {
    const line = findLine(label);
    if (line) rec.conquest[key] = extractLastNumber(line);
  }

  // -------- expedition --------
  if (rec.troop_type === "cavalry" || /Cavalry Attack/i.test(fullRaw)) {
    if (!rec.troop_type) rec.troop_type = "cavalry";

    const atk = findLine("Cavalry Attack");
    const def = findLine("Cavalry Defense");
    const leth = findLine("Cavalry Lethality");
    const hp = findLine("Cavalry Health");

    if (atk) rec.expedition.attack = extractLastPercent(atk);
    if (def) rec.expedition.defense = extractLastPercent(def);
    if (leth) rec.expedition.lethality = extractLastPercent(leth);
    if (hp) rec.expedition.health = extractLastPercent(hp);
  } else if (rec.troop_type === "infantry" || /Infantry Attack/i.test(fullRaw)) {
    if (!rec.troop_type) rec.troop_type = "infantry";

    const atk = findLine("Infantry Attack");
    const def = findLine("Infantry Defense");
    const leth = findLine("Infantry Lethality");
    const hp = findLine("Infantry Health");

    if (atk) rec.expedition.attack = extractLastPercent(atk);
    if (def) rec.expedition.defense = extractLastPercent(def);
    if (leth) rec.expedition.lethality = extractLastPercent(leth);
    if (hp) rec.expedition.health = extractLastPercent(hp);
  } else if (rec.troop_type === "archers" || /Archer Attack/i.test(fullRaw)) {
    if (!rec.troop_type) rec.troop_type = "archers";

    const atk = findLine("Archer Attack");
    const def = findLine("Archer Defense");
    const leth = findLine("Archer Lethality");
    const hp = findLine("Archer Health");

    if (atk) rec.expedition.attack = extractLastPercent(atk);
    if (def) rec.expedition.defense = extractLastPercent(def);
    if (leth) rec.expedition.lethality = extractLastPercent(leth);
    if (hp) rec.expedition.health = extractLastPercent(hp);
  }

  if (!rec.hero_name) rec.review_flags.push("Missing hero_name");
  if (!rec.troop_type) rec.review_flags.push("Missing troop_type");
  if (!rec.rarity) rec.review_flags.push("Missing rarity");
  if (!rec.conquest.hero_attack) rec.review_flags.push("Missing conquest stats");
  if (!rec.expedition.attack) rec.review_flags.push("Missing expedition stats");

  if (rec.review_flags.length) {
    rec.confidence.overall = 0.82;
  }

  return rec;
}

function parseHeroSkillsColumns(parts) {
  const {
    heroTopText = "",
    leftText = "",
    rightText = "",
    fullText = ""
  } = parts || {};

  const rec = {
    hero_name: null,
    troop_type: null,
    rarity: null,
    slots: {
      slot_1: { level: null, locked: null },
      slot_2: { level: null, locked: null },
      slot_3: { level: null, locked: null },
      slot_4: { level: null, locked: null },
      slot_5: { level: null, locked: null },
      slot_6: { level: null, locked: null }
    }
  };

  // hero identity from top crop or full OCR
  const topNorm = normalizeHeroName(heroTopText);
  const fullNorm = normalizeHeroName(fullText);

  for (const [key, meta] of Object.entries(HERO_LIBRARY)) {
    if (topNorm.includes(key) || fullNorm.includes(key)) {
      rec.hero_name = meta.canonical_name;
      rec.troop_type = meta.troop_type;
      rec.rarity = meta.rarity;
      break;
    }
  }

  function extractOrderedLevels(text) {
    const cleaned = String(text || "").replace(/\s+/g, " ");
    const matches = [...cleaned.matchAll(/Lv\.?\s*(\d)/gi)].map(m => parseInt(m[1], 10));

    // fallback if OCR missed "Lv." but still saw isolated digits near badges
    if (matches.length) return matches;

    return [];
  }

  const leftLevels = extractOrderedLevels(leftText);
  const rightLevels = extractOrderedLevels(rightText);

  // order is top -> middle -> bottom
  rec.slots.slot_1.level = leftLevels[0] ?? null;
  rec.slots.slot_2.level = leftLevels[1] ?? null;
  rec.slots.slot_3.level = leftLevels[2] ?? null;

  rec.slots.slot_4.level = rightLevels[0] ?? null;
  rec.slots.slot_5.level = rightLevels[1] ?? null;
  rec.slots.slot_6.level = rightLevels[2] ?? null;

  return rec;
}

async function loadImageFromFile(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      resolve(img);
    };
    img.onerror = reject;
    img.src = url;
  });
}

function cropCanvas(source, x, y, w, h) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const sw = source.width || source.naturalWidth;
  const sh = source.height || source.naturalHeight;

  const sx = Math.round(sw * x);
  const sy = Math.round(sh * y);
  const cw = Math.round(sw * w);
  const ch = Math.round(sh * h);

  canvas.width = cw;
  canvas.height = ch;
  ctx.drawImage(source, sx, sy, cw, ch, 0, 0, cw, ch);

  return canvas;
}

async function ocrCanvas(canvas, whitelist = "") {
  const options = {};
  if (whitelist) {
    options.tessedit_char_whitelist = whitelist;
  }

  const result = await Tesseract.recognize(canvas, "eng", options);
  return result?.data?.text || "";
}

function saveHero() {
  if (!currentHero) {
    alert("No hero parsed yet");
    return;
  }

  const db = getDb();
  const playerId = prompt("Enter player ID to attach hero:");

  if (!playerId) return;

  if (!db.players[playerId]) {
    alert("Player not found in DB");
    return;
  }

  db.players[playerId].hero = currentHero;
  db.players[playerId].updated_at = nowIso();

  setDb(db);

  alert("Hero saved to player " + playerId);
  setStatus("Hero saved.");
}

function saveHeroStats() {
  if (!currentHeroStats) {
    alert("No hero stats parsed yet");
    return;
  }

  const db = getDb();
  const playerId = prompt("Enter player ID to attach hero stats:");

  if (!playerId) return;

  if (!db.players[playerId]) {
    alert("Player not found in DB");
    return;
  }

  db.players[playerId].hero_stats = db.players[playerId].hero_stats || {};
  db.players[playerId].hero_stats[currentHeroStats.hero_name || "unknown_hero"] = currentHeroStats;
  db.players[playerId].updated_at = nowIso();

  setDb(db);

  alert("Hero stats saved to player " + playerId);
  document.getElementById("heroStatsStatus").textContent = "Hero stats saved.";
}

function saveHeroSkills() {
  const parsed = JSON.parse(
    document.getElementById("heroSkillsParsed").value
  );

  const heroName = parsed.hero_name || currentHero?.hero_name;

  if (!heroName) {
    alert("No hero selected");
    return;
  }

  const heroKey = heroName.toLowerCase();
  const library = HERO_LIBRARY[heroKey];
  if (!library) {
    alert("Hero not found in library");
    return;
  }

  const mappedSkills = {};

  for (const [slot, data] of Object.entries(parsed.slots || {})) {
    const skillMeta = library.skills?.[slot];
    if (!skillMeta) continue;

    mappedSkills[skillMeta.name] = {
      level: data.level,
      locked: data.locked
    };
  }

  currentHero.skills = mappedSkills;

  alert("Hero skills saved");
}
